<script>
    // 朗读函数
    function speak(text) {
        if (!text) return;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-CN'; // 设置为中文
        msg.rate = 0.8;    // 语速稍慢，方便学生听清
        window.speechSynthesis.speak(msg);
    }

    async function loadData() {
        const resp = await fetch('/Hsk-1/part-01.json');
        const words = await resp.json();
        const container = document.getElementById('dictionary');

        words.forEach(word => {
            const img = word.image ? `<img src="${word.image}" class="w-full h-48 object-cover rounded-lg mb-4">` : '<div class="h-48 bg-gray-200 rounded-lg mb-4 flex items-center justify-center text-gray-400 font-bold">虚词/助词</div>';
            
            container.innerHTML += `
                <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100 hover:shadow-md transition-shadow">
                    ${img}
                    <div class="flex justify-between items-center mb-3">
                        <span onclick="speak('${word.word}')" class="text-2xl font-bold text-gray-800 cursor-pointer hover:text-blue-600 active:scale-95 transition-all" title="点击朗读">
                            ${word.word} 🔊
                        </span>
                        <span class="text-blue-500 font-medium">${word.pinyin}</span>
                    </div>
                    <div class="text-sm text-gray-600 mb-4">
                        <p><strong>EN:</strong> ${word.english}</p>
                        <p dir="rtl" class="text-right font-medium"><strong>AR:</strong> ${word.arabic}</p>
                    </div>
                    <div onclick="speak('${word.sentence_cn}')" class="bg-blue-50 p-3 rounded-lg text-sm cursor-pointer hover:bg-blue-100 active:scale-95 transition-all" title="点击朗读例句">
                        <p class="font-bold text-gray-800">${word.sentence_cn} 🔊</p>
                        <p class="text-blue-400 italic">${word.sentence_py}</p>
                        <p class="text-gray-500 mt-1">${word.sentence_en}</p>
                    </div>
                </div>
            `;
        });
    }
    loadData();
</script>
