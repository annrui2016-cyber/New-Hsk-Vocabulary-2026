<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 1 在线词典</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <header class="text-center mb-10">
        <h1 class="text-3xl font-bold text-blue-900">HSK 2025 数字化词典</h1>
        <p class="text-gray-500 mt-2">Level 1 (1-30词)</p>
    </header>

    <div id="dictionary" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto"></div>

    <script>
        async function loadData() {
            const resp = await fetch('/Hsk-1/part-01.json');
            const words = await resp.json();
            const container = document.getElementById('dictionary');

            words.forEach(word => {
                const img = word.image ? `<img src="${word.image}" class="w-full h-48 object-cover rounded-lg mb-4">` : '<div class="h-48 bg-gray-200 rounded-lg mb-4 flex items-center justify-center text-gray-400">虚词/助词</div>';
                
                container.innerHTML += `
                    <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
                        ${img}
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-2xl font-bold text-gray-800">${word.word}</span>
                            <span class="text-blue-500 font-medium">${word.pinyin}</span>
                        </div>
                        <div class="text-sm text-gray-600 mb-4">
                            <p><strong>EN:</strong> ${word.english}</p>
                            <p dir="rtl" class="text-right font-medium"><strong>AR:</strong> ${word.arabic}</p>
                        </div>
                        <div class="bg-blue-50 p-3 rounded-lg text-sm">
                            <p class="font-bold text-gray-800">${word.sentence_cn}</p>
                            <p class="text-blue-400 italic">${word.sentence_py}</p>
                            <p class="text-gray-500 mt-1">${word.sentence_en}</p>
                        </div>
                    </div>
                `;
            });
        }
        loadData();
    </script>
</body>
</html>
