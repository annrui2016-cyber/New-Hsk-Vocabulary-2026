<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 1 在线词典</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .clickable:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-10">
    <header class="text-center mb-10">
        <h1 class="text-3xl font-bold text-blue-900">HSK 2025 数字化词典</h1>
        <p class="text-gray-500 mt-2">Level 1 (1-30词) · 点击文字朗读</p>
    </header>

    <div id="error-msg" class="text-red-500 text-center hidden">数据加载失败，请检查文件路径。</div>

    <div id="dictionary" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto">
        </div>

    <script>
        // 朗读功能
        function speak(text) {
            if (!text) return;
            window.speechSynthesis.cancel(); // 停止之前的朗读
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            msg.rate = 0.8; 
            window.speechSynthesis.speak(msg);
        }

        async function loadData() {
            const container = document.getElementById('dictionary');
            const errorDiv = document.getElementById('error-msg');

            try {
                // 请确保路径与 GitHub 中完全一致
                const resp = await fetch('/Hsk-1/part-01.json');
                if (!resp.ok) throw new Error('找不到数据文件');
                
                const words = await resp.json();
                
                let htmlContent = '';
                words.forEach(word => {
                    const imgTag = word.image ? 
                        `<img src="${word.image}" class="w-full h-48 object-cover rounded-lg mb-4">` : 
                        `<div class="h-48 bg-gray-200 rounded-lg mb-4 flex items-center justify-center text-gray-400">虚词/助词</div>`;
                    
                    htmlContent += `
                        <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100 transition-all">
                            ${imgTag}
                            <div class="flex justify-between items-center mb-3">
                                <span onclick="speak('${word.word}')" class="text-2xl font-bold text-gray-800 cursor-pointer hover:text-blue-600 clickable">
                                    ${word.word} 🔊
                                </span>
                                <span class="text-blue-500 font-medium">${word.pinyin}</span>
                            </div>
                            <div class="text-sm text-gray-600 mb-4 pb-2 border-b">
                                <p><strong>EN:</strong> ${word.english}</p>
                                <p dir="rtl" class="text-right font-medium text-lg"><strong>AR:</strong> ${word.arabic}</p>
                            </div>
                            <div onclick="speak('${word.sentence_cn}')" class="bg-blue-50 p-3 rounded-lg text-sm cursor-pointer hover:bg-blue-100 clickable">
                                <p class="font-bold text-gray-800 text-base">${word.sentence_cn} 🔊</p>
                                <p class="text-blue-400 italic">${word.sentence_py}</p>
                                <p class="text-gray-500 mt-1 text-xs">${word.sentence_en}</p>
                            </div>
