<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK3.0 在线三语学习词典</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 基础点击缩放效果 */
        .clickable:active { transform: scale(0.95); transition: 0.1s; }
        
        /* 卡片载入动画 */
        .card-enter { animation: fadeInUp 0.5s ease forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 标题文字渐变效果 */
        .text-gradient {
            background: linear-gradient(to right, #1e293b, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 勋章浮动动画效果 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
        .float-effect { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    
    <header class="text-center pt-10 pb-6 md:pt-16 md:pb-12 relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-80 h-80 bg-blue-100/50 blur-3xl rounded-full -z-10"></div>
        
        <h1 class="text-2xl md:text-4xl font-black text-slate-800 tracking-tight mb-4 px-4">
            <span class="text-gradient">HSK 3.0 在线三语学习词典</span>
        </h1>
        
        <div class="flex items-center justify-center gap-2">
            <span class="h-[1px] w-4 md:w-8 bg-slate-200"></span>
            <div class="float-effect px-4 py-1.5 bg-blue-600 text-white text-[10px] md:text-xs font-bold rounded-full shadow-lg shadow-blue-200 uppercase tracking-widest flex items-center gap-2">
                <span class="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></span>
                HSK1 · Unit 1 · Meeting Each Other
            </div>
            <span class="h-[1px] w-4 md:w-8 bg-slate-200"></span>
        </div>
    </header>

    <main class="p-4 md:p-8 pt-0">
        <div id="status" class="text-center text-slate-400 py-10 font-medium">正在加载词典数据...</div>

        <div id="dictionary" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto"></div>
    </main>

    <script>
        const paths = ['/Hsk-1/part-01.json', '/hsk-1/part-01.json', './Hsk-1/part-01.json'];

        function speak(text) {
            if (!text) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            msg.rate = 0.6; 
            window.speechSynthesis.speak(msg);
        }

        async function init() {
            const container = document.getElementById('dictionary');
            const status = document.getElementById('status');
            let data = null;

            for (let path of paths) {
                try {
                    const resp = await fetch(path);
                    if (resp.ok) {
                        data = await resp.json();
                        break;
                    }
                } catch (e) { continue; }
            }

            if (!data) {
                status.innerHTML = `<div class="text-red-500">无法读取数据。请检查 Hsk-1 文件夹内是否有 part-01.json</div>`;
                return;
            }

            status.classList.add('hidden');
            
            data.forEach((word, index) => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl shadow-sm border border-slate-100 p-5 card-enter flex flex-col';
                card.style.animationDelay = `${index * 0.05}s`;

                const imageHtml = word.image ? 
                    `<img src="${word.image}" class="w-full h-64 object-cover rounded-xl mb-4 bg-slate-100 shadow-inner">` : 
                    `<div class="w-full h-64 bg-slate-100 rounded-xl mb-4 flex items-center justify-center text-slate-300 font-bold italic text-sm">IMAGE</div>`;

                card.innerHTML = `
                    ${imageHtml}
                    <div class="flex justify-between items-center mb-4">
                        <div onclick="speak('${word.word}')" class="group cursor-pointer clickable">
                            <span class="text-3xl font-bold text-slate-800 group-hover:text-blue-600 transition-colors">${word.word}</span>
                            <span class="text-xl ml-1 text-blue-300 group-hover:text-blue-500 text-sm">🔊</span>
                        </div>
                        <span class="text-blue-500 font-semibold tracking-wide">${word.pinyin}</span>
                    </div>
                    
                    <div class="space-y-1 mb-5 text-sm border-l-2 border-slate-100 pl-3">
                        <p class="text-slate-600"><span class="text-slate-400 mr-1 font-mono text-xs">EN:</span> ${word.english}</p>
                        <p dir="rtl" class="text-right font-medium text-slate-700 leading-relaxed text-base">${word.arabic}</p>
                    </div>

                    <div class="mb-2 flex items-center">
                        <div class="h-[1px] bg-slate-50 flex-grow"></div>
                        <span class="mx-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest px-2 py-0.5 bg-slate-50 rounded border border-slate-100">例句 Example</span>
                        <div class="h-[1px] bg-slate-50 flex-grow"></div>
                    </div>
                    
                    <div onclick="speak('${word.sentence_cn}')" class="bg-blue-50/50 hover:bg-blue-50 p-4 rounded-xl cursor-pointer clickable transition-colors group mt-auto">
                        <p class="font-bold text-slate-800 mb-1 group-hover:text-blue-700">${word.sentence_cn} <span class="text-blue-300">🔊</span></p>
                        <p class="text-blue-400 text-xs italic mb-1">${word.sentence_py}</p>
                        <p class="text-slate-500 text-xs">${word.sentence_en}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        init();
    </script>
</body>
</html>
